<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMTD Unofficial Value List</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --header-text: #ffffff;
            --accent: #5865f2;
            --win: #4ade80;
            --loss: #f87171;
            --fair: #fbbf24;
            --legendary: #ffa500; --mythic: #ff4500; --exotic: #00ffff; --secret: #bf40bf;
            --divine: #ffff00; --hero: #00ff00; --exclusive: #7289da; --evo: #ffffff;
            --common: #8b949e; --rare: #58a6ff; --epic: #a371f7;
        }

        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
        header { text-align: center; padding: 10px 0; }
        h1 { color: var(--header-text); margin: 0; font-size: 1.8rem; }

        .intro-credits { background: #1c2128; border: 1px solid #30363d; border-radius: 12px; padding: 12px; margin: 15px 0; text-align: center; }
        .pill { display: inline-block; background: #2d333b; color: var(--accent); padding: 3px 8px; border-radius: 15px; font-size: 0.75rem; font-weight: 600; margin: 2px; border: 1px solid #444c56; }

        /* W/L Calculator */
        .calc-container { background: #1c2128; border: 2px solid var(--accent); border-radius: 15px; padding: 15px; margin-bottom: 25px; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .calc-box { background: var(--card-bg); padding: 10px; border-radius: 10px; text-align: center; }
        select { width: 100%; background: #0d1117; color: white; border: 1px solid #30363d; padding: 8px; border-radius: 5px; }
        .total-val { font-weight: bold; color: var(--win); font-size: 1.1rem; margin-top: 5px; }
        .result-banner { text-align: center; margin-top: 15px; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; display: none; }

        /* Navigation */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: bold; }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); }

        /* Rarity Filters (The Category Clickers) */
        .filter-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .filter-chip { padding: 8px 14px; border-radius: 8px; background: #21262d; border: 1px solid #30363d; color: white; cursor: pointer; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .filter-chip.active { border-color: white; background: #30363d; }

        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: var(--card-bg); color: white; margin-bottom: 15px; box-sizing: border-box; }

        /* The Grid */
        .unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; min-height: 100px; }
        .empty-msg { grid-column: 1 / -1; text-align: center; padding: 40px; color: #8b949e; font-style: italic; }
        
        .unit-card { background: var(--card-bg); border-radius: 8px; padding: 12px; border-top: 4px solid #30363d; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .unit-name { color: white; font-weight: bold; margin-bottom: 5px; }
        .unit-val { color: var(--win); font-weight: bold; }
        .rarity-label { font-size: 9px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }

        /* Rarity Colors */
        .COMMON { color: var(--common); } .RARE { color: var(--rare); } .EPIC { color: var(--epic); }
        .LEGENDARY { color: var(--legendary); } .MYTHIC { color: var(--mythic); } .EXOTIC { color: var(--exotic); } 
        .SECRET { color: var(--secret); } .DIVINE { color: var(--divine); } .HERO { color: var(--hero); } 
        .EXCLUSIVE { color: var(--exclusive); } .EVO { color: var(--evo); }
    </style>
</head>
<body>

    <header>
        <h1>OMTD VALUES</h1>
        <div class="intro-credits">
            <span class="pill">@SayHiLol</span> <span class="pill">@Cer</span> <span class="pill">@Affinity</span> <span class="pill">@Onest</span> <span class="pill">@Falledsyu</span>
        </div>
    </header>

    <div class="calc-container">
        <h3 style="text-align:center; margin:0 0 10px 0; color:var(--accent); font-size: 1rem;">W/L CALCULATOR</h3>
        <div class="calc-grid">
            <div class="calc-box">
                <div style="font-size: 0.7rem; margin-bottom:5px;">YOUR SIDE</div>
                <select id="userUnit" onchange="calculateTrade()"></select>
                <div class="total-val" id="userVal">0</div>
            </div>
            <div class="calc-box">
                <div style="font-size: 0.7rem; margin-bottom:5px;">THEIR SIDE</div>
                <select id="theirUnit" onchange="calculateTrade()"></select>
                <div class="total-val" id="theirVal">0</div>
            </div>
        </div>
        <div id="resultBanner" class="result-banner"></div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" id="unitsTab" onclick="setCategory('units')">Units</button>
        <button class="tab-btn" id="itemsTab" onclick="setCategory('items')">Items</button>
    </div>

    <div class="filter-bar" id="rarityFilters">
        </div>

    <input type="text" id="search" class="search-box" placeholder="Search for a name..." onkeyup="filterData()">
    
    <div class="unit-grid" id="grid">
        <div class="empty-msg">Select a category above to see values</div>
    </div>

    <script>
        const units = [
            { name: "Spinning Cat", rarity: "LEGENDARY", val: 5 },
            { name: "Shiny Spinning Cat", rarity: "LEGENDARY", val: 35 },
            { name: "Wazzup Ghostface", rarity: "LEGENDARY", val: 5 },
            { name: "Bus Puxlya", rarity: "MYTHIC", val: 18 },
            { name: "Susie", rarity: "MYTHIC", val: 15 },
            { name: "The Man Behind The Slaughter", rarity: "MYTHIC", val: 100 },
            { name: "Purple Guy", rarity: "EXOTIC", val: 95 },
            { name: "Sans", rarity: "EXOTIC", val: 22 },
            { name: "Ink Demon", rarity: "EXOTIC", val: 1100 },
            { name: "CatNap", rarity: "SECRET", val: 5500 },
            { name: "Bendy Statue", rarity: "SECRET", val: 47000 },
            { name: "Bill Cipher", rarity: "DIVINE", val: 7000 },
            { name: "One", rarity: "DIVINE", val: 20000 },
            { name: "D1M3NS10N4L", rarity: "HERO", val: 2500 },
            { name: "Cloudy", rarity: "EXCLUSIVE", val: 35000 },
            { name: "Frostbear", rarity: "EXCLUSIVE", val: 3200 },
            { name: "Vicious Bee", rarity: "EXCLUSIVE", val: 5000 },
            { name: "Baldi", rarity: "EXCLUSIVE", val: 65000 },
            { name: "1x4", rarity: "EXCLUSIVE", val: 80000 },
            { name: "Springtrap", rarity: "EVO", val: 450 },
            { name: "Wubbox (Evo)", rarity: "EVO", val: 12500 }
        ];

        const items = [
            { name: "Tix", rarity: "COMMON", val: 1 },
            { name: "Leaf", rarity: "COMMON", val: 1 },
            { name: "Freddy mask", rarity: "RARE", val: 3 },
            { name: "Sword", rarity: "RARE", val: 3 },
            { name: "Cloth", rarity: "EPIC", val: 5 },
            { name: "Traffic Cone", rarity: "EPIC", val: 4 },
            { name: "Yarn", rarity: "LEGENDARY", val: 20 },
            { name: "Endo Body", rarity: "LEGENDARY", val: 15 },
            { name: "Hammer", rarity: "LEGENDARY", val: 25 },
            { name: "Brainrot Rune", rarity: "LEGENDARY", val: 200 },
            { name: "67 Rune", rarity: "MYTHIC", val: 2000 },
            { name: "Bow tie", rarity: "EXOTIC", val: 50 },
            { name: "Bucket O’ Paint", rarity: "EXCLUSIVE", val: 500 },
            { name: "Golden Hat", rarity: "EXCLUSIVE", val: 700 },
            { name: "Prototype Crate", rarity: "SECRET", val: 70000 },
            { name: "Huggy Wuggy Crate", rarity: "EXCLUSIVE", val: 400 },
            { name: "Classic Crate", rarity: "EXCLUSIVE", val: 150 },
            { name: "Present", rarity: "EXCLUSIVE", val: 20 },
            { name: "Christmas Crate", rarity: "EXCLUSIVE", val: 200 },
            { name: "Deltarune Crate", rarity: "EXCLUSIVE", val: 150 },
            { name: "Playtime Crate", rarity: "EXCLUSIVE", val: 100 },
            { name: "Slap Crate", rarity: "EXCLUSIVE", val: 100 },
            { name: "Ultrakill Crate", rarity: "EXCLUSIVE", val: 10 },
            { name: "Evolution Crate", rarity: "EXCLUSIVE", val: 25 },
            { name: "Raid Crate 1", rarity: "EXCLUSIVE", val: 200 },
            { name: "Raid Crate 2", rarity: "EXCLUSIVE", val: 100 },
            { name: "Wubbox Crate", rarity: "EXCLUSIVE", val: 50 },
            { name: "Admin Abuse Crate 1", rarity: "EXCLUSIVE", val: 600 },
            { name: "The Alliance Crate", rarity: "EXCLUSIVE", val: 250 },
            { name: "Toilet Crate", rarity: "EXCLUSIVE", val: 10 }
        ];

        let currentCategory = 'units';
        let activeRarity = null;

        function setCategory(cat) {
            currentCategory = cat;
            activeRarity = null; // Reset rarity when switching tabs
            document.getElementById('unitsTab').classList.toggle('active', cat === 'units');
            document.getElementById('itemsTab').classList.toggle('active', cat === 'items');
            
            const data = cat === 'units' ? units : items;
            const rarities = [...new Set(data.map(d => d.rarity))];
            
            const filterBar = document.getElementById('rarityFilters');
            filterBar.innerHTML = rarities.map(r => `
                <div class="filter-chip" id="chip-${r}" onclick="setRarity('${r}')">${r}</div>
            `).join('');
            
            render([]); // Clear grid
            document.getElementById('grid').innerHTML = `<div class="empty-msg">Now select a rarity (e.g. ${rarities[0]})</div>`;
        }

        function setRarity(r) {
            activeRarity = r;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            document.getElementById(`chip-${r}`).classList.add('active');
            filterData();
        }

        function filterData() {
            if (!activeRarity) return;
            const query = document.getElementById('search').value.toLowerCase();
            const data = currentCategory === 'units' ? units : items;
            const filtered = data.filter(d => d.rarity === activeRarity && d.name.toLowerCase().includes(query));
            render(filtered);
        }

        function render(list) {
            const grid = document.getElementById('grid');
            if (list.length === 0 && activeRarity) {
                grid.innerHTML = `<div class="empty-msg">No results found in ${activeRarity}</div>`;
                return;
            }
            grid.innerHTML = list.map(u => `
                <div class="unit-card" style="border-top-color: var(--${u.rarity.toLowerCase()})">
                    <span class="rarity-label ${u.rarity}">${u.rarity}</span>
                    <div class="unit-name">${u.name}</div>
                    <div class="unit-val">${u.val.toLocaleString()} Gems</div>
                </div>
            `).join('');
        }

        // Calculator Logic
        function populateSelectors() {
            const all = [...units, ...items].sort((a,b) => a.name.localeCompare(b.name));
            const options = all.map(d => `<option value="${d.val}">${d.name}</option>`).join('');
            document.getElementById('userUnit').innerHTML = '<option value="0">Select...</option>' + options;
            document.getElementById('theirUnit').innerHTML = '<option value="0">Select...</option>' + options;
        }

        function calculateTrade() {
            const v1 = parseInt(document.getElementById('userUnit').value);
            const v2 = parseInt(document.getElementById('theirUnit').value);
            const banner = document.getElementById('resultBanner');
            document.getElementById('userVal').innerText = v1.toLocaleString();
            document.getElementById('theirVal').innerText = v2.toLocaleString();
            if(v1 === 0 || v2 === 0) { banner.style.display = 'none'; return; }
            banner.style.display = 'block';
            const diff = v2 - v1;
            if (diff > (v1 * 0.1)) { banner.innerText = "WIN!"; banner.style.background = 'var(--win)'; }
            else if (diff < -(v1 * 0.1)) { banner.innerText = "LOSS!"; banner.style.background = 'var(--loss)'; }
            else { banner.innerText = "FAIR"; banner.style.background = 'var(--fair)'; }
        }

        // Initialize
        populateSelectors();
        setCategory('units');
    </script>
</body>
</html>
