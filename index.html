<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMTD Unofficial Value List</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --header-text: #ffffff;
            --accent: #5865f2;
            --legendary: #ffa500;
            --mythic: #ff4500;
            --exotic: #00ffff;
            --secret: #bf40bf;
            --divine: #ffff00;
            --hero: #00ff00;
            --exclusive: #7289da;
            --evo: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }

        header {
            text-align: center;
            padding: 20px 0 10px 0;
        }

        h1 { color: var(--header-text); margin: 0; font-size: 1.8rem; letter-spacing: 1px; }
        
        /* Intro/Credits Section */
        .intro-credits {
            background: #1c2128;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0 25px 0;
            text-align: center;
        }

        .intro-text {
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #8b949e;
        }

        .credit-pills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .pill {
            background: #2d333b;
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #444c56;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: var(--card-bg);
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        .search-box:focus { border-color: var(--accent); }

        .unit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .unit-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            border-top: 4px solid var(--accent);
            display: flex;
            flex-direction: column;
        }

        .rarity-label {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .unit-name {
            color: var(--header-text);
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 6px;
        }

        .unit-val {
            color: #4ade80;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .unit-notes {
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: 4px;
        }

        /* Rarity Borders */
        .LEGENDARY { border-top-color: var(--legendary); color: var(--legendary); }
        .MYTHIC { border-top-color: var(--mythic); color: var(--mythic); }
        .EXOTIC { border-top-color: var(--exotic); color: var(--exotic); }
        .SECRET { border-top-color: var(--secret); color: var(--secret); }
        .DIVINE { border-top-color: var(--divine); color: var(--divine); }
        .HERO { border-top-color: var(--hero); color: var(--hero); }
        .EXCLUSIVE { border-top-color: var(--exclusive); color: var(--exclusive); }
        .EVO { border-top-color: var(--evo); color: var(--evo); }

    </style>
