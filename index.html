    <style>
        :root {
        .empty-msg { 
            grid-column: 1 / -1; 
            text-align: center; 
            padding: 60px 20px; 
            color: #8b949e; 
            font-style: italic; 
            font-size: 0.9rem;
        }
            
        .intro-credits { 
            background: #1c2128; 
            border: 1px solid #30363d; 
            border-radius: 12px; 
            padding: 12px; 
            margin: 15px 0; 
            text-align: center; 
        }

        .pill { 
            display: inline-block; 
            background: #2d333b; 
            color: var(--accent); 
            padding: 3px 8px; 
            border-radius: 15px; 
            font-size: 0.75rem; 
            font-weight: 600; 
            margin: 2px; 
            border: 1px solid #444c56; 
        }
            
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --header-text: #ffffff;
            --accent: #5865f2;
            --legendary: #00FFFF;
            --mythic: #ff4500;
            --exotic: #90EE90;
            --secret: #bf40bf;
            --divine: #FFC0CB;
            --hero: #ffA500;
            --exclusive: #E03FD8;
            --evo: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        h1 { color: var(--header-text); margin-bottom: 5px; }
        .subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 20px; }

        .search-box {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: var(--card-bg);
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        .search-box:focus { border-color: var(--accent); }

        .unit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .unit-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            border-top: 4px solid var(--accent);
            display: flex;
            flex-direction: column;
            transition: transform 0.1s;
        }

        .rarity-label {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .unit-name {
            color: var(--header-text);
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 6px;
        }

        .unit-val {
            color: #4ade80;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .unit-notes {
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: 4px;
        }

        /* Rarity Borders */
        .LEGENDARY { border-top-color: var(--legendary); color: var(--legendary); }
        .MYTHIC { border-top-color: var(--mythic); color: var(--mythic); }
        .EXOTIC { border-top-color: var(--exotic); color: var(--exotic); }
        .SECRET { border-top-color: var(--secret); color: var(--secret); }
        .DIVINE { border-top-color: var(--divine); color: var(--divine); }
        .HERO { border-top-color: var(--hero); color: var(--hero); }
        .EXCLUSIVE { border-top-color: var(--exclusive); color: var(--exclusive); }
        .EVO { border-top-color: var(--evo); color: var(--evo); }

    </style>
</head>

        function filterData() {
            if (!activeRarity) return;
            const query = document.getElementById('search').value.toLowerCase();
            const data = currentCategory === 'units' ? units : items;
            const filtered = data.filter(d => d.rarity === activeRarity && d.name.toLowerCase().includes(query));

        function render(list) {
            const grid = document.getElementById('grid');
            if (list.length === 0 && activeRarity) { grid.innerHTML = `<div class="empty-msg">None found</div>`; return; }
            grid.innerHTML = list.map(u => `
                <div class="unit-card" style="border-top-color: var(--${u.rarity.toLowerCase()})">
                    <span class="rarity-label ${u.rarity}">${u.rarity}</span>
                    <div class="unit-name">${u.name}</div>
                    <div class="unit-val">${u.val}</div>
                    ${u.note ? `<div class="unit-notes">${u.note}</div>` : ''}
                </div>
            `).join('');
        }

        function populateSelectors() {
            const all = [...units, ...items].sort((a,b) => a.name.localeCompare(b.name));
            const options = all.map(d => `<option value="${d.n}">${d.name}</option>`).join('');
            document.getElementById('userUnit').innerHTML = '<option value="0">Select...</option>' + options;
            document.getElementById('theirUnit').innerHTML = '<option value="0">Select...</option>' + options;
        }
