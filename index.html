<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMTD Unofficial Value List</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --header-text: #ffffff;
            --accent: #5865f2;
            --win: #4ade80;
            --loss: #f87171;
            --fair: #fbbf24;
            --legendary: #ffa500; --mythic: #ff4500; --exotic: #00ffff; --secret: #bf40bf;
            --divine: #ffff00; --hero: #00ff00; --exclusive: #7289da; --evo: #ffffff;
        }

        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
        header { text-align: center; padding: 10px 0; }
        h1 { color: var(--header-text); margin: 0; font-size: 1.8rem; }

        .intro-credits { background: #1c2128; border: 1px solid #30363d; border-radius: 12px; padding: 12px; margin: 15px 0; text-align: center; }
        .pill { display: inline-block; background: #2d333b; color: var(--accent); padding: 3px 8px; border-radius: 15px; font-size: 0.75rem; font-weight: 600; margin: 2px; border: 1px solid #444c56; }

        /* Calculator Styles */
        .calc-container { background: #1c2128; border: 2px solid var(--accent); border-radius: 15px; padding: 15px; margin-bottom: 25px; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .calc-box { background: var(--card-bg); padding: 10px; border-radius: 10px; text-align: center; }
        .calc-box h4 { margin: 0 0 10px 0; font-size: 0.8rem; text-transform: uppercase; }
        select { width: 100%; background: #0d1117; color: white; border: 1px solid #30363d; padding: 8px; border-radius: 5px; margin-bottom: 5px; }
        .total-val { font-weight: bold; color: var(--win); font-size: 1.1rem; }
        .result-banner { text-align: center; margin-top: 15px; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; display: none; }

        /* Nav & Search */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; font-weight: bold; }
        .tab-btn.active { background: var(--accent); }
        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: var(--card-bg); color: white; margin-bottom: 15px; box-sizing: border-box; }

        /* Grid Styles */
        .unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .unit-card { background: var(--card-bg); border-radius: 8px; padding: 12px; border-top: 4px solid #30363d; }
        .unit-name { color: white; font-weight: bold; margin-bottom: 5px; }
        .unit-val { color: var(--win); font-weight: bold; }
        .rarity-label { font-size: 9px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }

        /* Rarity colors */
        .LEGENDARY { color: var(--legendary); } .MYTHIC { color: var(--mythic); } .EXOTIC { color: var(--exotic); } 
        .SECRET { color: var(--secret); } .EXCLUSIVE { color: var(--exclusive); } .EVO { color: var(--evo); }
    </style>
</head>
<body>

    <header>
        <h1>OMTD VALUES</h1>
        <div class="intro-credits">
            <span class="pill">@SayHiLol</span> <span class="pill">@Cer</span> <span class="pill">@Affinity</span> <span class="pill">@Onest</span> <span class="pill">@Falledsyu</span>
        </div>
    </header>

    <div class="calc-container">
        <h3 style="text-align:center; margin:0; color:var(--accent);">W/L CALCULATOR</h3>
        <div class="calc-grid">
            <div class="calc-box">
                <h4>Your Side</h4>
                <select id="userUnit" onchange="calculateTrade()"></select>
                <div class="total-val" id="userVal">0</div>
            </div>
            <div class="calc-box">
                <h4>Their Side</h4>
                <select id="theirUnit" onchange="calculateTrade()"></select>
                <div class="total-val" id="theirVal">0</div>
            </div>
        </div>
        <div id="resultBanner" class="result-banner"></div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="setCategory('units')">Units</button>
        <button class="tab-btn" onclick="setCategory('items')">Items</button>
    </div>

    <input type="text" id="search" class="search-box" placeholder="Search values..." onkeyup="filterData()">
    <div class="unit-grid" id="grid"></div>

    <script>
        // DATA - Note: I used clean numbers for the calculator to work
        const units = [
            { name: "Spinning Cat", rarity: "LEGENDARY", val: 5 },
            { name: "Bus Puxlya", rarity: "MYTHIC", val: 20 },
            { name: "The Man Behind The Slaughter", rarity: "MYTHIC", val: 100 },
            { name: "Purple Guy", rarity: "EXOTIC", val: 150 },
            { name: "Ink Demon", rarity: "EXOTIC", val: 1200 },
            { name: "CatNap", rarity: "SECRET", val: 6000 },
            { name: "Bendy Statue", rarity: "SECRET", val: 50000 },
            { name: "Bill Cipher", rarity: "DIVINE", val: 8000 },
            { name: "Cloudy", rarity: "EXCLUSIVE", val: 35000 },
            { name: "Frostbear", rarity: "EXCLUSIVE", val: 3500 },
            { name: "Baldi", rarity: "EXCLUSIVE", val: 65000 },
            { name: "Wubbox (Evo)", rarity: "EVO", val: 15000 }
        ];

        const items = [
            { name: "Tix", rarity: "COMMON", val: 1 },
            { name: "Yarn", rarity: "LEGENDARY", val: 20 },
            { name: "Brainrot Rune", rarity: "LEGENDARY", val: 200 },
            { name: "67 Rune", rarity: "MYTHIC", val: 2000 },
            { name: "Prototype Crate", rarity: "SECRET", val: 70000 },
            { name: "Huggy Wuggy Crate", rarity: "EXCLUSIVE", val: 400 },
            { name: "Admin Abuse Crate 1", rarity: "EXCLUSIVE", val: 600 }
        ];

        let currentCategory = 'units';

        function populateSelectors() {
            const allData = [...units, ...items];
            const options = allData.map(d => `<option value="${d.val}">${d.name} (${d.val})</option>`).join('');
            document.getElementById('userUnit').innerHTML = '<option value="0">Select...</option>' + options;
            document.getElementById('theirUnit').innerHTML = '<option value="0">Select...</option>' + options;
        }

        function calculateTrade() {
            const v1 = parseInt(document.getElementById('userUnit').value);
            const v2 = parseInt(document.getElementById('theirUnit').value);
            const banner = document.getElementById('resultBanner');
            
            document.getElementById('userVal').innerText = v1.toLocaleString();
            document.getElementById('theirVal').innerText = v2.toLocaleString();

            if(v1 === 0 || v2 === 0) { banner.style.display = 'none'; return; }

            banner.style.display = 'block';
            const diff = v2 - v1;

            if (diff > (v1 * 0.1)) {
                banner.innerText = `BIG WIN! (+${diff.toLocaleString()})`;
                banner.style.background = 'var(--win)';
            } else if (diff < -(v1 * 0.1)) {
                banner.innerText = `LOSS! (${diff.toLocaleString()})`;
                banner.style.background = 'var(--loss)';
            } else {
                banner.innerText = "FAIR TRADE";
                banner.style.background = 'var(--fair)';
            }
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === cat));
            filterData();
        }

        function filterData() {
            const query = document.getElementById('search').value.toLowerCase();
            const data = currentCategory === 'units' ? units : items;
            const filtered = data.filter(d => d.name.toLowerCase().includes(query));
            render(filtered);
        }

        function render(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(u => `
                <div class="unit-card">
                    <span class="rarity-label ${u.rarity}">${u.rarity}</span>
                    <div class="unit-name">${u.name}</div>
                    <div class="unit-val">${u.val.toLocaleString()} Gems</div>
                </div>
            `).join('');
        }

        populateSelectors();
        filterData();
    </script>
</body>
</html>
