<head>
    <meta charset="UTF-8">

    <title>MTD Unofficial Value List</title>
    <style>
        :root {
            --primary: #0f0f1a;
            --secondary: #1a1a2e;
            --accent: #00d4ff;
            --text: #ffffff;
            --legendary: #00FFFF;
            --mythic: #ff4500;
            --exotic: #90EE90;
            --secret: #bf40bf;
            --divine: #FFC0CB;
            --hero: #ffA500;
            --exclusive: #E03FD8;
            --evo: #ffffff;
            --common: #bdc3c7;
            --rare: #27ae60;
            --epic: #8e44ad;
            --shiny: #ffd700; 
            --win: #2ecc71;
            --loss: #e74c3c;
            --fair: #f1c40f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
            color: var(--text);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        header {
            margin-bottom: 30px;
            padding: 30px;
            background: linear-gradient(145deg, #16213e, #1a1a2e);
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .credits {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.6;
        }

        .credits b { color: var(--accent); }

        .main-nav, .rarity-nav {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: var(--secondary);
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8em;
            transition: all 0.3s ease;
            border: 1px solid #444;
        }

        button:hover {
            transform: translateY(-2px);
            background: #252545;
            border-color: var(--accent);
        }

        button.active {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        #btn-shiny.active {
            background: var(--shiny);
            color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

                /* New Calculator UI Styles */
        .suggestions-box {
            position: absolute;
            background: #1a1a2e;
            border: 1px solid var(--accent);
            width: 100%;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .sug-item {
            padding: 10px;
            cursor: pointer;
            text-align: left;
            border-bottom: 1px solid #333;
            font-size: 0.9em;
        }
        .sug-item:hover { background: #252545; color: var(--accent); }
        .added-items {
            margin-top: 15px;
            min-height: 80px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
            border: 1px dashed #444;
        }
        .selected-unit {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f0f1a;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 0.85em;
            border-left: 3px solid var(--accent);
        }
        .remove-item { 
            color: #ff4500; 
            cursor: pointer; 
            font-weight: bold; 
            margin-left: 10px;
            padding: 2px 6px;
            background: rgba(255, 69, 0, 0.1);
            border-radius: 4px;
        }
        .side-total { 
            margin-top: 15px; 
            font-weight: 800; 
            color: var(--accent); 
            font-size: 1.1em;
            background: rgba(0, 212, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
        }
        .calc-input-group { position: relative; }


        #list-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .value-card {
            background: var(--secondary);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 4px solid gray;
            text-align: left;
            transition: 0.3s;
        }

        .value-card:hover { transform: scale(1.02); }

        .rarity-LEGENDARY { border-top-color: var(--legendary); }
        .rarity-MYTHIC { border-top-color: var(--mythic); }
        .rarity-EXOTIC { border-top-color: var(--exotic); }
        .rarity-SECRET { border-top-color: var(--secret); }
        .rarity-DIVINE { border-top-color: var(--divine); }
        .rarity-HERO { border-top-color: var(--hero); }
        .rarity-EXCLUSIVE { border-top-color: var(--exclusive); }
        .rarity-EVO { border-top-color: var(--evo); }
        .rarity-COMMON { border-top-color: var(--common); }
        .rarity-RARE { border-top-color: var(--rare); }
        .rarity-EPIC { border-top-color: var(--epic); }
        .rarity-SHINY { border-top-color: var(--shiny); border-top-width: 6px; }

        .item-name { font-size: 1.2em; font-weight: 800; margin-bottom: 5px; }
        .item-note { color: #888; font-size: 0.85em; margin-bottom: 15px; min-height: 20px;}
        .value-box { 
            background: rgba(0, 212, 255, 0.1);
            padding: 8px;
            border-radius: 8px;
            color: var(--accent);
            font-weight: 800;
            text-align: center;
        }

        .rarity-SHINY .value-box {
            background: rgba(255, 215, 0, 0.1);
            color: var(--shiny);
        }

        .hidden { display: none !important; }
        .empty-msg { grid-column: 1/-1; padding: 50px; color: #555; }

        @media (max-width: 600px) {
            .calc-container { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <header>
        <h1>MTD UNOFFICIAL VALUE LIST</h1>
        <p>Lets larp multiverse tower defense together!</p>
        <div class="credits">

        </div>

    <div class="container">
        <div class="main-nav">
            <button onclick="showCategory('units')" id="btn-units" class="active">Clear Units</button>
            <button onclick="showCategory('shiny')" id="btn-shiny">Shiny Units</button>
            <button onclick="showCategory('items')" id="btn-items">Items</button>
            <button onclick="showCategory('calc')" id="btn-calc">Calculator</button>
        </div>

        <div id="unit-rarities" class="rarity-nav">
            <button class="r-btn" onclick="filterRarity('LEGENDARY', this)">Legendary</button>
            <button class="r-btn" onclick="filterRarity('MYTHIC', this)">Mythic</button>
            <button class="r-btn" onclick="filterRarity('EXOTIC', this)">Exotic</button>
            <button class="r-btn" onclick="filterRarity('SECRET', this)">Secret</button>
            <button class="r-btn" onclick="filterRarity('DIVINE', this)">Divine</button>
            <button class="r-btn" onclick="filterRarity('HERO', this)">Hero</button>
            <button class="r-btn" onclick="filterRarity('EXCLUSIVE', this)">Exclusive</button>
            <button class="r-btn" onclick="filterRarity('EVO', this)">Evo/Crafted</button>
        </div>

        <div id="shiny-rarities" class="rarity-nav hidden">
            <button class="r-btn" onclick="filterRarity('SECRET', this)">Secret</button>
            <button class="r-btn" onclick="filterRarity('HERO', this)">Hero</button>
            <button class="r-btn" onclick="filterRarity('DIVINE', this)">Divine</button>
        </div>

        <div id="item-rarities" class="rarity-nav hidden">
            <button class="r-btn" onclick="filterRarity('COMMON', this)">Common</button>
            <button class="r-btn" onclick="filterRarity('RARE', this)">Rare</button>
            <button class="r-btn" onclick="filterRarity('EPIC', this)">Epic</button>
            <button class="r-btn" onclick="filterRarity('LEGENDARY', this)">Legendary</button>
            <button class="r-btn" onclick="filterRarity('MYTHIC', this)">Mythic</button>
            <button class="r-btn" onclick="filterRarity('EXOTIC', this)">Exotic</button>
            <button class="r-btn" onclick="filterRarity('SECRET', this)">Secret</button>
            <button class="r-btn" onclick="filterRarity('EXCLUSIVE', this)">Exclusive</button>
        </div>

                <div id="calculator-section" class="hidden">
            <div class="calc-container">
                <div class="calc-side">
                    <h3>YOUR OFFER</h3>
                    <div class="calc-input-group">
                        <input type="text" id="your-search" placeholder="Search unit/item..." oninput="showSuggestions(this, 'your')" autocomplete="off">
                        <div id="your-suggestions" class="suggestions-box"></div>
                    </div>
                    <div id="your-list" class="added-items"></div>
                    <div class="side-total">Total: <span id="your-total-display">0</span> Gems</div>
                </div>

                <div class="calc-side">
                    <h3>THEIR OFFER</h3>
                    <div class="calc-input-group">
                        <input type="text" id="their-search" placeholder="Search unit/item..." oninput="showSuggestions(this, 'their')" autocomplete="off">
                        <div id="their-suggestions" class="suggestions-box"></div>
                    </div>
                    <div id="their-list" class="added-items"></div>
                    <div class="side-total">Total: <span id="their-total-display">0</span> Gems</div>
                </div>

                <div id="trade-result" class="result-banner">Add items to see result</div>
                <button onclick="clearCalc()" style="grid-column: 1/-1; margin-top:10px; background:#444; width: 100%;">Clear Calculator</button>
            </div>
        </div>

        <div id="list-container"></div>
    </div>

                { name: "Ultrakill Crate", rarity: "EXCLUSIVE", value: "10", note: "" },
                { name: "Evolution Crate", rarity: "EXCLUSIVE", value: "25", note: "" },
                { name: "Raid Crate 1", rarity: "EXCLUSIVE", value: "200", note: "" },
                { name: "Raid Crate 2", rarity: "EXCLUSIVE", value: "100", note: "" },
                { name: "Exclusive Crate 1", rarity: "EXCLUSIVE", value: "300", note: "" },
                { name: "Exclusive Crate 2", rarity: "EXCLUSIVE", value: "180", note: "" },
                { name: "Wubbox Crate", rarity: "EXCLUSIVE", value: "50", note: "" },
                { name: "Super Crate", rarity: "EXCLUSIVE", value: "10", note: "" },
                { name: "Admin Abuse Crate 1", rarity: "EXCLUSIVE", value: "600", note: "" },
                { name: "Admin Abuse Crate 2", rarity: "EXCLUSIVE", value: "300", note: "" },

                { name: "Admin Abuse Crate 4", rarity: "EXCLUSIVE", value: "200", note: "" },
                { name: "April Fools Crate", rarity: "EXCLUSIVE", value: "100", note: "" },
                { name: "The Alliance Crate", rarity: "EXCLUSIVE", value: "250", note: "" },
                { name: "Toilet Crate", rarity: "EXCLUSIVE", value: "10", note: "" }
            ]
        };

        function showCategory(cat) {
            // Update main button states
            const buttons = ['units', 'shiny', 'items', 'calc'];
            buttons.forEach(b => {
                document.getElementById('btn-' + b).className = (cat === b) ? 'active' : '';
            });
            
            // Hide all rarity navs and the calculator
            document.getElementById('unit-rarities').classList.add('hidden');
            document.getElementById('shiny-rarities').classList.add('hidden');
            document.getElementById('item-rarities').classList.add('hidden');
            document.getElementById('calculator-section').classList.add('hidden');
            document.getElementById('list-container').classList.remove('hidden');

            // Show current category UI
            if (cat === 'units') document.getElementById('unit-rarities').classList.remove('hidden');
            if (cat === 'shiny') document.getElementById('shiny-rarities').classList.remove('hidden');
            if (cat === 'items') document.getElementById('item-rarities').classList.remove('hidden');
            
            if (cat === 'calc') {
                document.getElementById('calculator-section').classList.remove('hidden');
                document.getElementById('list-container').classList.add('hidden');
            } else {
                window.currentCat = cat;
                document.getElementById('list-container').innerHTML = '<div class="empty-msg">Select a Rarity to view the values.</div>';
                document.querySelectorAll('.r-btn').forEach(b => b.classList.remove('active'));
            }
        }

        function filterRarity(rarity, btn) {
            document.querySelectorAll('.r-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const items = data[window.currentCat].filter(i => i.rarity === rarity);
            const container = document.getElementById('list-container');
            
            if (items.length === 0) {
                container.innerHTML = '<div class="empty-msg">No data available for this rarity yet.</div>';
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="value-card ${window.currentCat === 'shiny' ? 'rarity-SHINY' : 'rarity-' + item.rarity}">
                    <div class="item-name">${item.name}</div>
                    <div class="item-note">${item.note}</div>
                    <div class="value-box">${item.value}</div>
                </div>
            `).join('');
        }

                // Variables to store the current trade
        let yourOfferList = [];
        let theirOfferList = [];

        // Helper to convert strings like "1.5k-2k" or "80k+" into numbers
        function parseValue(valStr) {
            if (!valStr || valStr === "N/A" || valStr === "O/C" || valStr === "TBA") return 0;
            
            // Clean the string (remove "Gems", "+", spaces, make lowercase)
            let clean = valStr.toLowerCase().replace(/gems/g, '').replace(/\+/g, '').trim();
            
            // Handle ranges by taking the average (e.g., "10-20" becomes 15)
            if (clean.includes('-')) {
                let parts = clean.split('-');
                return (parseValue(parts[0]) + parseValue(parts[1])) / 2;
            }
            
            let num = parseFloat(clean);
            if (clean.includes('k')) num *= 1000;
            return isNaN(num) ? 0 : num;
        }

        // Search logic
        function showSuggestions(input, side) {
            const query = input.value.toLowerCase();
            const box = document.getElementById(side + '-suggestions');
            if (query.length < 1) { box.innerHTML = ''; return; }

            // Search through units, shiny, and items
            const allItems = [...data.units, ...data.shiny, ...data.items];
            const matches = allItems.filter(i => i.name.toLowerCase().includes(query)).slice(0, 6);

            box.innerHTML = matches.map(item => `
                <div class="sug-item" onclick="addItem('${side}', '${item.name.replace(/'/g, "\\'")}', '${item.value}')">
                    <b>${item.name}</b> <br> <small style="color:#888">${item.rarity} - ${item.value}</small>
                </div>
            `).join('');
        }

        function addItem(side, name, value) {
            const item = { name, value, numeric: parseValue(value) };
            if (side === 'your') yourOfferList.push(item);
            else theirOfferList.push(item);
            
            // Reset input and list
            document.getElementById(side + '-search').value = '';
            document.getElementById(side + '-suggestions').innerHTML = '';
            renderCalc();
        }

        function removeItem(side, index) {
            if (side === 'your') yourOfferList.splice(index, 1);
            else theirOfferList.splice(index, 1);
            renderCalc();
        }

        function renderCalc() {
            const renderSide = (side, list) => {
                const container = document.getElementById(side + '-list');
                container.innerHTML = list.length === 0 ? '<div style="color:#555; font-size:0.8em;">No items added</div>' : list.map((item, index) => `
                    <div class="selected-unit">
                        <span>${item.name}</span>
                        <span><small>${item.value}</small> <span class="remove-item" onclick="removeItem('${side}', ${index})">✕</span></span>
                    </div>
                `).join('');
                
                const total = list.reduce((sum, item) => sum + item.numeric, 0);
                document.getElementById(side + '-total-display').innerText = total.toLocaleString();
                return total;
            };

            const yourTotal = renderSide('your', yourOfferList);
            const theirTotal = renderSide('their', theirOfferList);
            
            const resBox = document.getElementById('trade-result');
            const diff = theirTotal - yourTotal;

            if (yourTotal === 0 && theirTotal === 0) {
                resBox.innerText = "Add items to see result";
                resBox.className = "result-banner";
                resBox.style.borderColor = "#333";
            } else if (diff > 0) {
                resBox.innerText = `YOU WIN! (+${diff.toLocaleString()} Gems)`;
                resBox.className = "result-banner res-win";
            } else if (diff < 0) {
                resBox.innerText = `YOU LOSE! (-${Math.abs(diff).toLocaleString()} Gems)`;
                resBox.className = "result-banner res-loss";
            } else {
                resBox.innerText = "FAIR TRADE (Equal Value)";
                resBox.className = "result-banner res-fair";
            }

        function clearCalc() {
            yourOfferList = [];
            theirOfferList = [];
            renderCalc();
        }

        }

        // Default Load
        showCategory('units');
    </script>
