<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTD Unofficial Value List</title>
    <style>
        :root {
            --primary: #0f0f1a;
            --secondary: #1a1a2e;
            --accent: #00d4ff;
            --text: #ffffff;
            --legendary: #00FFFF;
            --mythic: #ff4500;
            --exotic: #90EE90;
            --secret: #bf40bf;
            --divine: #FFC0CB;
            --hero: #ffA500;
            --exclusive: #E03FD8;
            --evo: #ffffff;
            --common: #bdc3c7;
            --rare: #27ae60;
            --epic: #8e44ad;
            /* New Shiny Color */
            --shiny: #ffd700; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
            color: var(--text);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        header {
            margin-bottom: 30px;
            padding: 30px;
            background: linear-gradient(145deg, #16213e, #1a1a2e);
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .credits {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.6;
        }

        .credits b { color: var(--accent); }

        .main-nav, .rarity-nav {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: var(--secondary);
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8em;
            transition: all 0.3s ease;
            border: 1px solid #444;
        }

        button:hover {
            transform: translateY(-2px);
            background: #252545;
            border-color: var(--accent);
        }

        button.active {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        /* Specific style for Shiny Category button when active */
        #btn-shiny.active {
            background: var(--shiny);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        #list-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .value-card {
            background: var(--secondary);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 4px solid gray;
            text-align: left;
            transition: 0.3s;
        }

        .value-card:hover { transform: scale(1.02); }

        .rarity-LEGENDARY { border-top-color: var(--legendary); }
        .rarity-MYTHIC { border-top-color: var(--mythic); }
        .rarity-EXOTIC { border-top-color: var(--exotic); }
        .rarity-SECRET { border-top-color: var(--secret); }
        .rarity-DIVINE { border-top-color: var(--divine); }
        .rarity-HERO { border-top-color: var(--hero); }
        .rarity-EXCLUSIVE { border-top-color: var(--exclusive); }
        .rarity-EVO { border-top-color: var(--evo); }
        .rarity-COMMON { border-top-color: var(--common); }
        .rarity-RARE { border-top-color: var(--rare); }
        .rarity-EPIC { border-top-color: var(--epic); }
        /* Shiny border color */
        .rarity-SHINY { border-top-color: var(--shiny); border-top-width: 6px; }

        .item-name { font-size: 1.2em; font-weight: 800; margin-bottom: 5px; }
        .item-note { color: #888; font-size: 0.85em; margin-bottom: 15px; min-height: 20px;}
        .value-box { 
            background: rgba(0, 212, 255, 0.1);
            padding: 8px;
            border-radius: 8px;
            color: var(--accent);
            font-weight: 800;
            text-align: center;
        }

        .rarity-SHINY .value-box {
            background: rgba(255, 215, 0, 0.1);
            color: var(--shiny);
        }

        .hidden { display: none; }
        
        .empty-msg { grid-column: 1/-1; padding: 50px; color: #555; }
    </style>
</head>

        function showCategory(cat) {
            document.getElementById('btn-units').className = (cat === 'units') ? 'active' : '';
            document.getElementById('btn-shiny').className = (cat === 'shiny') ? 'active' : '';
            document.getElementById('btn-items').className = (cat === 'items') ? 'active' : '';
            
            document.getElementById('unit-rarities').className = (cat === 'units') ? 'rarity-nav' : 'hidden';
            document.getElementById('shiny-rarities').className = (cat === 'shiny') ? 'rarity-nav' : 'hidden';
            document.getElementById('item-rarities').className = (cat === 'items') ? 'rarity-nav' : 'hidden';
            
            window.currentCat = cat;
            document.getElementById('list-container').innerHTML = '<div class="empty-msg">Select a Rarity to view the values.</div>';
            
            document.querySelectorAll('.r-btn').forEach(b => b.classList.remove('active'));
        }

        function filterRarity(rarity, btn) {
            document.querySelectorAll('.r-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const items = data[window.currentCat].filter(i => i.rarity === rarity);
            const container = document.getElementById('list-container');
            
            if (items.length === 0) {
                container.innerHTML = '<div class="empty-msg">No data available for this rarity yet.</div>';
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="value-card ${window.currentCat === 'shiny' ? 'rarity-SHINY' : 'rarity-' + item.rarity}">
                    <div class="item-name">${item.name}</div>
                    <div class="item-note">${item.note}</div>
                    <div class="value-box">${item.value}</div>
                </div>
            `).join('');
        }
